<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pledge Tracker — Loan Mountain Capital</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #1C2B3A;
    --blue-accent: #3B82F6;
    --bg: #EEF2F7;
    --card-bg: #FFFFFF;
    --border: #D1DCE8;
    --text-primary: #1C2B3A;
    --text-secondary: #5A7291;
    --text-muted: #8FA3BB;

    --c1-border: #A78BFA; --c1-badge: #3B0764; --c1-badge-bg: #EDE9FE; --c1-header: #6D28D9;
    --c2-border: #F59E0B; --c2-badge: #78350F; --c2-badge-bg: #FEF3C7; --c2-header: #D97706;
    --c3-border: #3B82F6; --c3-badge: #0C447C; --c3-badge-bg: #DBEAFE; --c3-header: #1D4ED8;
    --c4-border: #F97316; --c4-badge: #7C2D12; --c4-badge-bg: #FFEDD5; --c4-header: #C2410C;
    --c5-border: #22C55E; --c5-badge: #14532D; --c5-badge-bg: #DCFCE7; --c5-header: #15803D;
  }

  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text-primary); min-height: 100vh; }

  .header { background: var(--navy); padding: 18px 24px 14px; display: flex; align-items: flex-end; justify-content: space-between; border-bottom: 2px solid var(--blue-accent); }
  .header-left h1 { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; color: #fff; letter-spacing: 0.04em; text-transform: uppercase; }
  .header-left p { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .header-right { display: flex; align-items: center; gap: 10px; }

  .sync-indicator { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-muted); display: flex; align-items: center; gap: 5px; opacity: 0; transition: opacity 0.3s; }
  .sync-indicator.visible { opacity: 1; }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: #22C55E; }
  .sync-dot.syncing { background: #F59E0B; animation: pulse 0.8s infinite; }
  .sync-dot.error { background: #EF4444; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .add-btn { background: var(--blue-accent); color: #fff; border: none; padding: 8px 16px; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: background 0.15s; }
  .add-btn:hover { background: #2563EB; }

  .stats-bar { background: #fff; border-bottom: 1px solid var(--border); padding: 10px 24px; display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
  .stat-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-secondary); font-family: 'DM Mono', monospace; }
  .stat-dot { width: 8px; height: 8px; border-radius: 50%; }
  .stat-item strong { color: var(--text-primary); font-size: 14px; }

  .board { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; padding: 20px 24px; min-height: calc(100vh - 120px); }
  .column { display: flex; flex-direction: column; }

  .col-header { padding: 10px 12px 9px; border-radius: 8px 8px 0 0; display: flex; align-items: flex-start; border-left: 3px solid; background: var(--card-bg); border-top: 1px solid var(--border); border-right: 1px solid var(--border); min-height: 54px; }
  .col-header-left { display: flex; align-items: flex-start; gap: 6px; flex: 1; }
  .col-title { font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; line-height: 1.35; }
  .col-count { font-family: 'DM Mono', monospace; font-size: 11px; padding: 2px 7px; border-radius: 99px; font-weight: 500; flex-shrink: 0; margin-top: 1px; }

  .col-c1 .col-header { border-left-color: var(--c1-border); } .col-c1 .col-title { color: var(--c1-header); } .col-c1 .col-count { background: var(--c1-badge-bg); color: var(--c1-badge); }
  .col-c2 .col-header { border-left-color: var(--c2-border); } .col-c2 .col-title { color: var(--c2-header); } .col-c2 .col-count { background: var(--c2-badge-bg); color: var(--c2-badge); }
  .col-c3 .col-header { border-left-color: var(--c3-border); } .col-c3 .col-title { color: var(--c3-header); } .col-c3 .col-count { background: var(--c3-badge-bg); color: var(--c3-badge); }
  .col-c4 .col-header { border-left-color: var(--c4-border); } .col-c4 .col-title { color: var(--c4-header); } .col-c4 .col-count { background: var(--c4-badge-bg); color: var(--c4-badge); }
  .col-c5 .col-header { border-left-color: var(--c5-border); } .col-c5 .col-title { color: var(--c5-header); } .col-c5 .col-count { background: var(--c5-badge-bg); color: var(--c5-badge); }

  .col-body { flex: 1; padding: 8px; background: #F3F7FC; border: 1px solid var(--border); border-top: none; border-radius: 0 0 8px 8px; min-height: 200px; transition: background 0.15s; }
  .col-body.drag-over { background: #E2ECF8; }

  .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 6px; padding: 10px; margin-bottom: 8px; cursor: grab; transition: box-shadow 0.15s, transform 0.1s; position: relative; }
  .card:hover { box-shadow: 0 4px 12px rgba(28,43,58,0.1); transform: translateY(-1px); }
  .card.dragging { opacity: 0.45; cursor: grabbing; }

  .card-delete { position: absolute; top: 7px; right: 7px; background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 12px; border-radius: 3px; padding: 2px 4px; opacity: 0; transition: opacity 0.15s, color 0.1s; }
  .card:hover .card-delete { opacity: 1; }
  .card-delete:hover { color: #EF4444; }

  .card-field { outline: none; border-radius: 4px; transition: background 0.15s; cursor: text; }
  .card-field:hover { background: #F0F4F8; }
  .card-field:focus { background: #EEF2F7; box-shadow: 0 0 0 2px var(--blue-accent); }

  .card-name { font-size: 12px; font-weight: 600; color: var(--text-primary); line-height: 1.4; padding: 2px 22px 2px 4px; margin-bottom: 7px; display: block; word-break: break-word; }

  .card-meta { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; margin-bottom: 6px; }

  /* Assignee pills */
  .assignee-select {
    font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500;
    padding: 2px 8px; border-radius: 99px; border: none; cursor: pointer;
    outline: none; appearance: none; -webkit-appearance: none; letter-spacing: 0.04em;
  }
  .assignee-select:focus { box-shadow: 0 0 0 2px var(--blue-accent); }
  .assignee-Serena { background: #FCE7F3; color: #831843; }
  .assignee-Frank  { background: #E0F2FE; color: #0C4A6E; }
  .assignee-Angel  { background: #FEF3C7; color: #78350F; }
  .assignee-none   { background: #F1F5F9; color: var(--text-muted); }

  .card-notes { font-size: 11px; color: var(--text-secondary); line-height: 1.45; border-top: 1px solid var(--bg); padding: 5px 4px 2px; min-height: 1.4em; display: block; word-break: break-word; }
  .card-notes:empty:before { content: attr(data-placeholder); color: var(--text-muted); opacity: 0.5; }

  .empty-col { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-muted); text-align: center; padding: 20px 0; }

  .loading-overlay { position: fixed; inset: 0; background: rgba(238,242,247,0.85); display: flex; align-items: center; justify-content: center; z-index: 200; font-family: 'DM Mono', monospace; font-size: 13px; color: var(--text-secondary); flex-direction: column; gap: 12px; }
  .loading-overlay.hidden { display: none; }
  .spinner { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--blue-accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Config banner — shown until URL is pasted */
  .config-banner { background: #FEF3C7; border-bottom: 1px solid #FCD34D; padding: 10px 24px; display: flex; align-items: center; gap: 10px; font-size: 13px; color: #78350F; }
  .config-banner.hidden { display: none; }
  .config-input { flex: 1; border: 1px solid #FCD34D; border-radius: 5px; padding: 5px 10px; font-family: 'DM Mono', monospace; font-size: 12px; color: #1C2B3A; background: #fff; outline: none; }
  .config-btn { background: #D97706; color: #fff; border: none; padding: 6px 14px; border-radius: 5px; font-size: 12px; font-weight: 500; cursor: pointer; white-space: nowrap; }
  .config-btn:hover { background: #B45309; }
</style>
</head>
<body>

<div class="loading-overlay" id="loading-overlay">
  <div class="spinner"></div>
  <span>Loading...</span>
</div>

<div class="header">
  <div class="header-left">
    <h1>Pledge Tracker</h1>
    <p>Loan Mountain Capital</p>
  </div>
  <div class="header-right">
    <div class="sync-indicator" id="sync-indicator">
      <span class="sync-dot" id="sync-dot"></span>
      <span id="sync-label">Saved</span>
    </div>
    <button class="add-btn" onclick="addCard()">+ Add Property</button>
  </div>
</div>

<div class="config-banner" id="config-banner">
  ⚠️ One-time setup: paste your Apps Script URL and click Connect.
  <input class="config-input" id="config-url" placeholder="https://script.google.com/macros/s/YOUR_ID/exec">
  <button class="config-btn" onclick="saveConfig()">Connect</button>
</div>

<div class="stats-bar" id="stats-bar"></div>

<div class="board">
  <div class="column col-c1">
    <div class="col-header"><div class="col-header-left"><span class="col-title">Awaiting CRB Feedback</span><span class="col-count" id="count-Awaiting CRB Feedback">0</span></div></div>
    <div class="col-body" id="body-Awaiting CRB Feedback" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event,'Awaiting CRB Feedback')"></div>
  </div>
  <div class="column col-c2">
    <div class="col-header"><div class="col-header-left"><span class="col-title">Fundings Addressing CRB Comments</span><span class="col-count" id="count-Fundings Addressing CRB Comments">0</span></div></div>
    <div class="col-body" id="body-Fundings Addressing CRB Comments" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event,'Fundings Addressing CRB Comments')"></div>
  </div>
  <div class="column col-c3">
    <div class="col-header"><div class="col-header-left"><span class="col-title">Awaiting Lynn Feedback</span><span class="col-count" id="count-Awaiting Lynn Feedback">0</span></div></div>
    <div class="col-body" id="body-Awaiting Lynn Feedback" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event,'Awaiting Lynn Feedback')"></div>
  </div>
  <div class="column col-c4">
    <div class="col-header"><div class="col-header-left"><span class="col-title">Fundings Addressing Lynn Comments</span><span class="col-count" id="count-Fundings Addressing Lynn Comments">0</span></div></div>
    <div class="col-body" id="body-Fundings Addressing Lynn Comments" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event,'Fundings Addressing Lynn Comments')"></div>
  </div>
  <div class="column col-c5">
    <div class="col-header"><div class="col-header-left"><span class="col-title">Fully Approved</span><span class="col-count" id="count-Fully Approved">0</span></div></div>
    <div class="col-body" id="body-Fully Approved" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event,'Fully Approved')"></div>
  </div>
</div>

<script>
  const STATUSES = ['Awaiting CRB Feedback','Fundings Addressing CRB Comments','Awaiting Lynn Feedback','Fundings Addressing Lynn Comments','Fully Approved'];
  const DOT_COLORS = {'Awaiting CRB Feedback':'#A78BFA','Fundings Addressing CRB Comments':'#F59E0B','Awaiting Lynn Feedback':'#3B82F6','Fundings Addressing Lynn Comments':'#F97316','Fully Approved':'#22C55E'};
  const ASSIGNEES = ['Serena','Frank','Angel'];

  let items = [];
  let dragId = null;
  let SCRIPT_URL = localStorage.getItem('lmc-pledge-url') || '';

  // ── Config ──
  function saveConfig() {
    const url = document.getElementById('config-url').value.trim();
    if (!url.startsWith('https://script.google.com')) { alert('Invalid URL — please check and try again.'); return; }
    SCRIPT_URL = url;
    localStorage.setItem('lmc-pledge-url', url);
    document.getElementById('config-banner').classList.add('hidden');
    loadFromSheet();
  }
  function checkConfig() {
    if (SCRIPT_URL) { document.getElementById('config-banner').classList.add('hidden'); loadFromSheet(); }
    else { document.getElementById('loading-overlay').classList.add('hidden'); }
  }

  // ── Sync UI ──
  function showSync(state, label) {
    const ind = document.getElementById('sync-indicator');
    const dot = document.getElementById('sync-dot');
    ind.classList.add('visible');
    dot.className = 'sync-dot' + (state === 'syncing' ? ' syncing' : state === 'error' ? ' error' : '');
    document.getElementById('sync-label').textContent = label;
    if (state === 'saved') setTimeout(() => ind.classList.remove('visible'), 2500);
  }

  // ── Sheet API ──
  async function loadFromSheet() {
    document.getElementById('loading-overlay').classList.remove('hidden');
    try {
      const res = await fetch(SCRIPT_URL + '?action=get', { redirect: 'follow' });
      items = await res.json();
    } catch(e) { showSync('error', 'Load failed'); items = []; }
    document.getElementById('loading-overlay').classList.add('hidden');
    render();
  }

  async function pushToSheet(action, payload) {
    showSync('syncing', 'Saving...');
    try {
      let url = SCRIPT_URL + '?action=' + action;
      if (payload.item) url += '&item=' + encodeURIComponent(JSON.stringify(payload.item));
      if (payload.id)   url += '&id='   + encodeURIComponent(String(payload.id));
      await fetch(url, { redirect: 'follow' });
      showSync('saved', 'Saved');
    } catch(e) { showSync('error', 'Save failed'); }
  }

  // ── Render ──
  function esc(str) { return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function cardHTML(item) {
    const id = String(item.id);
    const assignee = item.assignee || '';
    return `
      <div class="card" draggable="true" id="card-${id}" ondragstart="onDragStart(event,'${id}')" ondragend="onDragEnd()">
        <button class="card-delete" onclick="deleteCard('${id}')" title="Delete">✕</button>
        <div class="card-name card-field" contenteditable="true"
          onblur="saveField('${id}','name',this)"
          onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur();}">
          ${esc(item.name)}
        </div>
        <div class="card-meta">
          <select class="assignee-select assignee-${assignee||'none'}"
            onchange="saveAssignee('${id}',this)" onclick="event.stopPropagation()">
            <option value="" ${!assignee?'selected':''}>Unassigned</option>
            ${ASSIGNEES.map(a => `<option value="${a}" ${assignee===a?'selected':''}>${a}</option>`).join('')}
          </select>
        </div>
        <div class="card-notes card-field" contenteditable="true" data-placeholder="Add notes..."
          onblur="saveField('${id}','notes',this)">
          ${esc(item.notes)}
        </div>
      </div>`;
  }

  function render() {
    STATUSES.forEach(s => {
      const body = document.getElementById('body-' + s);
      const filtered = items.filter(i => i.status === s);
      document.getElementById('count-' + s).textContent = filtered.length;
      body.innerHTML = filtered.length === 0
        ? `<div class="empty-col">No items</div>`
        : filtered.map(cardHTML).join('');
    });
    document.getElementById('stats-bar').innerHTML = STATUSES.map(s =>
      `<div class="stat-item"><span class="stat-dot" style="background:${DOT_COLORS[s]}"></span><strong>${items.filter(i=>i.status===s).length}</strong> <span style="max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${esc(s)}">${esc(s)}</span></div>`
    ).join('<span style="color:var(--border);font-size:16px">·</span>');
  }

  // ── Field save handlers ──
  function saveField(id, field, el) {
    const item = items.find(i => String(i.id) === String(id));
    if (!item) return;
    const val = el.innerText.trim();
    if (item[field] === val) return;
    item[field] = val;
    pushToSheet('update', { item });
  }

  function saveAssignee(id, select) {
    const item = items.find(i => String(i.id) === String(id));
    if (!item) return;
    item.assignee = select.value;
    select.className = 'assignee-select assignee-' + (select.value || 'none');
    pushToSheet('update', { item });
  }

  // ── Add card ──
  function addCard() {
    const today = new Date().toLocaleDateString('en-US',{month:'numeric',day:'numeric',year:'numeric'});
    const item = { id: Date.now().toString(), name: '', assignee: '', status: 'Awaiting CRB Feedback', notes: '', date: today };
    items.unshift(item);
    render();
    pushToSheet('add', { item });
    setTimeout(() => { const el = document.querySelector(`#card-${item.id} .card-name`); if (el) el.focus(); }, 50);
  }

  // ── Delete ──
  function deleteCard(id) {
    items = items.filter(i => String(i.id) !== String(id));
    render();
    pushToSheet('delete', { id });
  }

  // ── Drag & Drop ──
  function onDragStart(e, id) {
    if (document.activeElement && document.activeElement.isContentEditable) { e.preventDefault(); return; }
    dragId = id;
    setTimeout(() => document.getElementById('card-' + id)?.classList.add('dragging'), 0);
  }
  function onDragEnd() { document.querySelectorAll('.card').forEach(c => c.classList.remove('dragging')); }
  function onDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
  function onDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
  function onDrop(e, status) {
    e.preventDefault(); e.currentTarget.classList.remove('drag-over');
    if (!dragId) return;
    const item = items.find(i => String(i.id) === String(dragId));
    if (item && item.status !== status) { item.status = status; render(); pushToSheet('update', { item }); }
    dragId = null;
  }

  checkConfig();
</script>
</body>
</html>
